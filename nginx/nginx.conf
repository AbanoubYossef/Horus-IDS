worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;

    # ── Upstream ───────────────────────────────────────────────────────────────
    upstream horus_api {
        server horus-api:8000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ──────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        # TLS certs (volume-mounted from ./nginx/certs/)
        ssl_certificate     /etc/nginx/certs/horus.crt;
        ssl_certificate_key /etc/nginx/certs/horus.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header X-Frame-Options           "SAMEORIGIN"                          always;

        # ── WebSocket ─────────────────────────────────────────────────────────
        location /ws/ {
            proxy_pass          http://horus_api;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ── API + frontend ────────────────────────────────────────────────────
        location / {
            proxy_pass          http://horus_api;
            proxy_http_version  1.1;
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
            client_max_body_size 64m;
        }
    }
}
