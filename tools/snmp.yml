auths:
  utcn_v3:
    version: 3
    username: SNMP-MONITOR
    security_level: authPriv
    auth_protocol: SHA
    password: Ci$c0@UTCN123
    priv_protocol: AES
    priv_password: Ci$c0@UTCN123

modules:
  if_mib:
    walk:
      - sysUpTime
      - interfaces
      - ifXTable
    metrics:
      - name: sysUpTime
        oid: 1.3.6.1.2.1.1.3
        type: gauge
        help: The time (in hundredths of a second) since the network management portion of the system was last re-initialized.
        indexes: []
      - name: interfaces
        oid: 1.3.6.1.2.1.2
        type: gauge
        help: The number of network interfaces (regardless of their current state) present on this system.
        indexes: []
      - name: ifIndex
        oid: 1.3.6.1.2.1.2.2.1.1
        type: gauge
        help: A unique value, greater than zero, for each interface.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifDescr
        oid: 1.3.6.1.2.1.2.2.1.2
        type: DisplayString
        help: A textual string containing information about the interface.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifType
        oid: 1.3.6.1.2.1.2.2.1.3
        type: gauge
        help: The type of interface.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifMtu
        oid: 1.3.6.1.2.1.2.2.1.4
        type: gauge
        help: The size of the largest packet which can be sent/received on the interface, specified in octets.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifSpeed
        oid: 1.3.6.1.2.1.2.2.1.5
        type: gauge
        help: An estimate of the interface's current bandwidth in bits per second.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifAdminStatus
        oid: 1.3.6.1.2.1.2.2.1.7
        type: gauge
        help: The desired state of the interface.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifOperStatus
        oid: 1.3.6.1.2.1.2.2.1.8
        type: gauge
        help: The current operational state of the interface.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifLastChange
        oid: 1.3.6.1.2.1.2.2.1.9
        type: gauge
        help: The value of sysUpTime at the time the interface entered its current operational state.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifInOctets
        oid: 1.3.6.1.2.1.2.2.1.10
        type: counter
        help: The total number of octets received on the interface, including framing characters.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifInUcastPkts
        oid: 1.3.6.1.2.1.2.2.1.11
        type: counter
        help: The number of packets, delivered by this sub-layer to a higher (sub-)layer, which were not addressed to a multicast or broadcast address at this sub-layer.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifInDiscards
        oid: 1.3.6.1.2.1.2.2.1.13
        type: counter
        help: The number of inbound packets which were chosen to be discarded.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifInErrors
        oid: 1.3.6.1.2.1.2.2.1.14
        type: counter
        help: For packet-oriented interfaces, the number of inbound packets that contained errors preventing them from being deliverable to a higher-layer protocol.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifOutOctets
        oid: 1.3.6.1.2.1.2.2.1.16
        type: counter
        help: The total number of octets transmitted out of the interface, including framing characters.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifOutUcastPkts
        oid: 1.3.6.1.2.1.2.2.1.17
        type: counter
        help: The total number of packets that higher-level protocols requested be transmitted, and which were not addressed to a multicast or broadcast address at this sub-layer.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifOutDiscards
        oid: 1.3.6.1.2.1.2.2.1.19
        type: counter
        help: The number of outbound packets which were chosen to be discarded.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifOutErrors
        oid: 1.3.6.1.2.1.2.2.1.20
        type: counter
        help: For packet-oriented interfaces, the number of outbound packets that could not be transmitted because of errors.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifName
        oid: 1.3.6.1.2.1.31.1.1.1.1
        type: DisplayString
        help: The textual name of the interface.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifInMulticastPkts
        oid: 1.3.6.1.2.1.31.1.1.1.2
        type: counter
        help: The number of packets, delivered by this sub-layer to a higher (sub-)layer, which were addressed to a multicast address at this sub-layer.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifInBroadcastPkts
        oid: 1.3.6.1.2.1.31.1.1.1.3
        type: counter
        help: The number of packets, delivered by this sub-layer to a higher (sub-)layer, which were addressed to a broadcast address at this sub-layer.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifOutMulticastPkts
        oid: 1.3.6.1.2.1.31.1.1.1.4
        type: counter
        help: The total number of packets that higher-level protocols requested be transmitted, and which were addressed to a multicast address at this sub-layer.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifOutBroadcastPkts
        oid: 1.3.6.1.2.1.31.1.1.1.5
        type: counter
        help: The total number of packets that higher-level protocols requested be transmitted, and which were addressed to a broadcast address at this sub-layer.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifHCInOctets
        oid: 1.3.6.1.2.1.31.1.1.1.6
        type: counter
        help: The total number of octets received on the interface, including framing characters.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifHCInUcastPkts
        oid: 1.3.6.1.2.1.31.1.1.1.7
        type: counter
        help: The number of packets, delivered by this sub-layer to a higher (sub-)layer, which were not addressed to a multicast or broadcast address at this sub-layer.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifHCInMulticastPkts
        oid: 1.3.6.1.2.1.31.1.1.1.8
        type: counter
        help: The number of packets, delivered by this sub-layer to a higher (sub-)layer, which were addressed to a multicast address at this sub-layer.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifHCInBroadcastPkts
        oid: 1.3.6.1.2.1.31.1.1.1.9
        type: counter
        help: The number of packets, delivered by this sub-layer to a higher (sub-)layer, which were addressed to a broadcast address at this sub-layer.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifHCOutOctets
        oid: 1.3.6.1.2.1.31.1.1.1.10
        type: counter
        help: The total number of octets transmitted out of the interface, including framing characters.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifHCOutUcastPkts
        oid: 1.3.6.1.2.1.31.1.1.1.11
        type: counter
        help: The total number of packets that higher-level protocols requested be transmitted, and which were not addressed to a multicast or broadcast address at this sub-layer.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifHCOutMulticastPkts
        oid: 1.3.6.1.2.1.31.1.1.1.12
        type: counter
        help: The total number of packets that higher-level protocols requested be transmitted, and which were addressed to a multicast address at this sub-layer.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifHCOutBroadcastPkts
        oid: 1.3.6.1.2.1.31.1.1.1.13
        type: counter
        help: The total number of packets that higher-level protocols requested be transmitted, and which were addressed to a broadcast address at this sub-layer.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifHighSpeed
        oid: 1.3.6.1.2.1.31.1.1.1.15
        type: gauge
        help: An estimate of the interface's current bandwidth in units of 1,000,000 bits per second.
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifAlias
        oid: 1.3.6.1.2.1.31.1.1.1.18
        type: DisplayString
        help: This object is an 'alias' name for the interface as specified by a network manager, and provides a non-volatile 'handle' for the interface.
        indexes:
          - labelname: ifIndex
            type: gauge
